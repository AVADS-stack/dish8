<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
</head>
<body style="margin:0;padding:0;background:#0f0f0f;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#0f0f0f;">
    <tr>
      <td align="center" style="padding:24px 16px;">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;background:#1a1a1a;border-radius:16px;overflow:hidden;border:1px solid #2a2a2a;">

          <tr>
            <td style="background:#a18cd1;padding:32px 24px;text-align:center;">
              <h1 style="margin:0;color:#fff;font-size:32px;font-weight:900;">DISH<span style="font-size:38px;">8</span></h1>
              <p style="margin:8px 0 0;color:rgba(255,255,255,0.9);font-size:15px;">Sign In Link</p>
            </td>
          </tr>

          <tr>
            <td style="padding:32px 28px;">
              <h2 style="margin:0 0 12px;color:#fff;font-size:22px;">Sign in to Dish8</h2>
              <p style="margin:0 0 16px;color:#e5e5e5;font-size:15px;line-height:1.65;">
                Click the button below to securely sign in to your Dish8 account. No password needed.
              </p>

              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin:24px 0;">
                <tr>
                  <td align="center">
                    <a href="{{ .ConfirmationURL }}" target="_blank" style="display:inline-block;background:#a18cd1;color:#fff;padding:14px 40px;border-radius:10px;text-decoration:none;font-weight:700;font-size:15px;">
                      Sign In to Dish8
                    </a>
                  </td>
                </tr>
              </table>

              <hr style="border:none;border-top:1px solid #2a2a2a;margin:20px 0;">
              <p style="margin:0;color:#888;font-size:12px;">If you didn't request this, ignore this email. Link expires in 24 hours.</p>
            </td>
          </tr>

          <tr>
            <td style="padding:16px 24px;border-top:1px solid #2a2a2a;text-align:center;">
              <p style="margin:0;font-size:11px;color:#888;">&copy; {{ .Year }} Dish8 LLC.</p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
