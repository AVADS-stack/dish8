<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="#e50914"/>

  <!-- Subtle gradient overlay -->
  <defs>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.1)"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="224" fill="url(#shine)"/>

  <!-- DISH text -->
  <text x="512" y="380" font-family="Arial,Helvetica,sans-serif" font-size="220" font-weight="900" fill="#ffffff" text-anchor="middle" dominant-baseline="central" letter-spacing="-8">DISH</text>

  <!-- 8 (larger, bold) -->
  <text x="512" y="660" font-family="Arial,Helvetica,sans-serif" font-size="320" font-weight="900" fill="#ffffff" text-anchor="middle" dominant-baseline="central">8</text>
</svg>
